version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      # Docker secara otomatis membaca file .env di root direktori
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    # Menggunakan port dinamis dari .env
    command: python manage.py runserver 127.0.0.1:${DJANGO_PORT}
    volumes:
      - .:/app
    ports:
      - "${DJANGO_PORT}:${DJANGO_PORT}"
    depends_on:
      - db
    environment:
      - DEBUG=${DEBUG}
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_HOST=db
      - DB_PORT=3306
    restart: always

volumes:
  mysql_data: