<!DOCTYPE html>
<html class="light" lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>
      {% block title %}
        DOC Mart Admin - Dashboard
      {% endblock %}
    </title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base_admin.css' %}" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-primary-fixed': '#002201',
              'inverse-on-surface': '#f0f2df',
              'on-primary-container': '#9dd090',
              'inverse-surface': '#2f3225',
              'on-tertiary': '#ffffff',
              'primary-fixed': '#bcf0ae',
              primary: '#154212',
              'on-secondary-fixed': '#2c160e',
              'inverse-primary': '#a1d494',
              'surface-container-high': '#e8ead6',
              'on-secondary-fixed-variant': '#5d4037',
              'surface-dim': '#d9dcc8',
              'on-primary-fixed-variant': '#23501e',
              'on-tertiary-fixed-variant': '#3c4c2c',
              'on-primary': '#ffffff',
              'primary-container': '#2d5a27',
              'on-secondary': '#ffffff',
              'on-surface': '#1a1d11',
              surface: '#f9fbe7',
              tertiary: '#2e3e20',
              'secondary-fixed': '#ffdbd0',
              'surface-container-low': '#f3f5e1',
              'surface-container-lowest': '#ffffff',
              'on-surface-variant': '#42493e',
              'surface-container-highest': '#e2e4d1',
              'secondary-container': '#fed3c7',
              'on-error-container': '#93000a',
              'on-tertiary-fixed': '#111f05',
              outline: '#72796e',
              secondary: '#77574d',
              'outline-variant': '#c2c9bb',
              'tertiary-container': '#455535',
              background: '#f9fbe7',
              'on-background': '#1a1d11',
              'surface-variant': '#e2e4d1',
              'surface-tint': '#3b6934',
              'tertiary-fixed': '#d6e9be',
              'tertiary-fixed-dim': '#bacda4',
              'primary-fixed-dim': '#a1d494',
              'on-secondary-container': '#795950',
              'on-tertiary-container': '#b6c9a0',
              'error-container': '#ffdad6',
              'surface-container': '#edf0dc',
              'on-error': '#ffffff',
              'surface-bright': '#f9fbe7',
              'secondary-fixed-dim': '#e7bdb1',
              error: '#ba1a1a'
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px'
            },
            fontFamily: {
              'label-sm': ['Open Sans', 'sans-serif'],
              h3: ['Open Sans', 'sans-serif'],
              h1: ['Open Sans', 'sans-serif'],
              h2: ['Open Sans', 'sans-serif'],
              'body-lg': ['Open Sans', 'sans-serif'],
              'body-md': ['Open Sans', 'sans-serif']
            },
            fontSize: {
              xs: ['11px', '16px'], // Turun dari 12px
              sm: ['13px', '20px'], // Turun dari 14px
              base: ['14px', '24px'], // Turun dari 16px
              lg: ['16px', '24px'], // Turun dari 18px
              xl: ['18px', '28px'], // Turun dari 20px
              '2xl': ['20px', '28px'], // Turun dari 24px
              '3xl': ['24px', '32px'] // Turun dari 30px
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-surface-container-lowest text-on-surface antialiased custom-scrollbar">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden transition-opacity duration-300"></div>

    <div class="flex h-screen overflow-hidden">
      <aside id="sidebar" class="w-64 bg-surface flex flex-col border-r border-outline-variant fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out shadow-xl lg:shadow-none h-full">
        <div class="p-6 border-b border-outline-variant/30 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
              <span class="material-symbols-outlined font-bold text-[24px]">home_app_logo</span>
            </div>
            <div>
              <h1 class="font-bold text-lg text-primary leading-tight">DOC Mart</h1>
              <p class="text-xs text-on-surface-variant font-medium">Admin Panel</p>
            </div>
          </div>
          <button id="close-sidebar-btn" class="lg:hidden text-on-surface-variant hover:text-error transition-colors focus:outline-none"><span class="material-symbols-outlined">close</span></button>
        </div>

        <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto custom-scrollbar"></nav>

        <div class="p-4 border-t border-outline-variant/30">
          <a href="{% url 'admin:logout' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-bold text-error rounded-xl hover:bg-error/10 transition-colors group">
            <span class="material-symbols-outlined text-[20px] group-hover:scale-110 transition-transform">logout</span>
            Keluar Sistem
          </a>
        </div>
      </aside>

      <main class="flex-1 flex flex-col h-screen overflow-hidden bg-surface-container-lowest relative">
        <header class="lg:hidden bg-surface border-b border-outline-variant/30 p-4 flex items-center justify-between sticky top-0 z-30">
          <div class="flex items-center gap-3">
            <button id="open-sidebar-btn" class="text-on-surface p-1 rounded-lg hover:bg-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary"><span class="material-symbols-outlined text-[28px]">menu</span></button>
            <h2 class="font-bold text-lg text-primary">DOC Mart</h2>
          </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
          {% block content %}

          {% endblock %}
        </div>
      </main>
    </div>
  </body>
  {% load static %}
  <script src="{% static 'js/base_admin.js' %}"></script>
</html>
