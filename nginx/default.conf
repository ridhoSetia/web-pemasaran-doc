# Konfigurasi Perlindungan Rate Limiting di level Nginx
# Membatasi rata-rata 10 request per detik per IP
limit_req_zone $binary_remote_addr zone=action_limit:10m rate=10r/s;

# 1. BENTENG PERTAMA: Blokir Akses Menggunakan IP Publik Langsung
server {
    listen 80 default_server;
    server_name _;
    return 444; # Langsung putus koneksi tanpa memberikan respons (kebal dari bot scanner)
}

# 2. SERVER UTAMA: Akses Menggunakan Domain Resmi
server {
    listen 80;
    server_name kelompoktanimelati.id www.kelompoktanimelati.id localhost 127.0.0.1;

    # OPTIMASI PERFORMA: Gzip Compression
    # Mengompresi file teks, CSS, dan JS sebelum dikirim ke browser (menghemat bandwidth & RAM VPS)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # OPTIMASI KEAMANAN: HTTP Security Headers
    add_header X-Frame-Options "DENY" always; # Cegah serangan Clickjacking
    add_header X-Content-Type-Options "nosniff" always; # Cegah MIME-sniffing
    add_header X-XSS-Protection "1; mode=block" always; # Proteksi XSS bawaan browser lawas
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy ke aplikasi Django (Gunicorn/Uvicorn di dalam kontainer Docker)
    location / {
        # Terapkan Rate Limiting dengan toleransi burst 20 request jika trafik padat
        limit_req zone=action_limit burst=20 nodelay;

        proxy_pass http://web:8000; # 'web' adalah nama service Django Anda di docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # OPTIMASI PERFORMA: Penanganan Static Files Langsung oleh Nginx
    # Mengurangi beban kerja Python/Django agar fokus pada logika bisnis
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}